[project]
name = "xai-project-5"
version = "0.1.0"
description = "Unsupervised Concept Discovery and Evaluation for Medical Vision-Language Models"
requires-python = ">=3.10"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["config", "utils", "extract_embeddings", "build_vocabulary"]
packages = ["xai_datasets"]

[tool.setuptools.package-dir]
"" = "src"
"xai_datasets" = "xai_datasets"
